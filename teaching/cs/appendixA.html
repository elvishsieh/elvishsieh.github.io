# NASM Assembler
</script></section>
<section data-markdown><script type="text/template">
## 安裝與設定 NASM 組譯器
- 下載 NASM assembler
	- 從 [NASM — The Netwide Assembler](https://www.nasm.us/) 下載 Win 64 穩定版或發行版
- 執行安裝程式或解壓縮
	- 有兩種版本，可以下載 nasm-3.xxxx-installer-x64.exe 安裝檔或者 nasm-3.xxxxx-win64.zip 壓縮檔
	- 假設安裝或解壓縮在 **D:\NASM 目錄**
- 設定環境變數
	- 開始 ≫ 系統 ≫ 進階系統設定 ≫ 環境變數 ≫ PATH ≫ 加入 NASM 安裝或解壓縮的目錄
	- **將 D:\NASM 加入到 PATH 內部**
</script></section>
<section data-markdown><script type="text/template">
## 安裝 LLVM/Clang 編譯器
- 在 **MSYS2/MinGW64** 環境安裝 LLVM/Clang 編譯器
	- 請參考 [Installing MSYS2/MinGW64](../cpp/01intro.html#/3/6) 及 
	[MinGW64/CLANG64 compiler packages](../cpp/01intro.html#/3/7) 步驟安裝
- 安裝 LLVM/Clang for MSVC 編譯器
	- 從 [LLVM](https://llvm.org/) 網站下載 [LLVM for Windows 版本](https://github.com/llvm/llvm-project)
	- 從 [Microsoft Visual Studio](https://visualstudio.microsoft.com/downloads/) 下載 Visual Studio 或 [Visual Studio Build Tools](https://visualstudio.microsoft.com/downloads/)(or [LTSCs](https://learn.microsoft.com/en-us/visualstudio/releases/2022/release-history#release-dates-and-build-numbers))
	- 僅需要安裝**使用 C++ 的桌面開發**套件
![](/images/cs/msvc.png)
</script></section>

<section data-markdown><script type="text/template">
## 安裝 Visual Studio Build Tools
- 安裝 Visual Studio Build Tools 與安裝 Visual Studio 不同，沒有 Visual Studio 圖形開發的介面
- 在命令提示列輸入 cl, link 編譯與連結指令注意事項
	- 使用 Visual Studio Installer ≫ Visual Studio Build Tools 右邊「啟動」按鈕開啟 Developer Command Prompt 命令提示列
	- 在Microsoft.PowerShell_profile.ps1中加入[PScode](../src/cs/msvcConsole.ps1)程式碼
	- 在 PowerShell 中輸入下列指令

<pre><code data-trim data-line-numbers>cmd /c 'call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64 && powershell'</code></pre>
</script></section>
