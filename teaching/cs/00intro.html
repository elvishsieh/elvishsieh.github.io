<section data-markdown><script type="text/template">
# Algorithm
</script></section>
<section data-markdown><script type="text/template">
## Algorithm, Program and Software
- What is algorithm(演算法)?
	- **Algorithm** 是描述某項作業如何被執行的步驟
	- 例如：食譜、到達陌生城市的路線、洗衣機的操作等
- What is a **Program**(程式)?
	- Algorithm 是由 Program 來實現，人們撰寫程式碼(Coding)，產出 Program, 再交給機器執行
	- 依照機器可以辨認的編碼格式來編輯稱之為 **Programming** or **Coding**.
		- 例如：機器語言、組合語言、高階程式語言(C, C++, Python, etc ...)
- 許多 Program**s** 的集合統稱為 a **Software**.
</script></section>
<section data-markdown><script type="text/template">
## Program and Software
![](/images/cs/software.png)
</script></section>
<section data-markdown><script type="text/template">
## Programming Language
</script></section>
<section data-markdown><script type="text/template">
## Low-Level Languages
- Machine Language(機器語言)
	- **許多 0 和 1 組成的編碼系統**，編碼系統是按照 CPU(Central Processing Unit) 可辨識與執行的指令所組成
	- 機器語言分**精簡與複雜指令集，編碼亦依照 CPU 不同而異** 
- Assembly language(組合語言)
	- 組合語言是一種低階的程式語言，用**人類可以讀懂的簡略文字來表示**，使用 Assembler(組譯器)轉成機器語言
![](/images/cs/machineLanguage.jpg)
<p style="text-align:center">
<small>Source from <a href="https://en.wikipedia.org/wiki/Machine_code">Wikipedia</a></small>
</p>
</script></section>
<section data-markdown><script type="text/template">
## High-Level Languages
- **Compiled** Programming Language(編譯程式語言)
	- **原始程式碼必須全部經由 Compiler**(編譯器)轉成可以被機器執行的機器語言，**程式才可以被執行**
	- Fortran, C, C++, Java, Rust, Go, C#
	- 類似於**文學翻譯、點字轉譯**
	- 執行速度快、不容易除錯(debug)
- **Interpreted** Programming Language(直譯程式語言)
	- 每一行原始程式可以在執行期間經由 interpreter 轉譯成可以被執行的程式
	- Python, PHP, Javascript, Perl
	- 類似於**現場英文口譯、手語即時轉譯**
	- 執行速度慢、容易 debug
</script></section>
<section data-markdown><script type="text/template">
## Assembly Code
- Download and install Assembler, Linker, Assembly code
	- [NASM — The Netwide Assembler](./appendixA.html#/0/1)
	- [LLVM/Clang Compiler for Windows](./appendixA.html#/0/2)
	- ['helloWorld' assembly code](../src/cs/helloWorld.asm)
	- **Setting environment variable** to exceute nasm and clang in command line. 
- Assemble it into a Windows 64-bit object file
	- **nasm -f win64 helloWorld.asm -o helloWorld.obj**
- Link the object file into an executable application using LLVM/Clang
	- **clang helloWorld.obj -o helloWorld.exe**
</script></section>

## C++ Compiler for Windows(1/2)
- LLVM/Clang
	-  **Low-Level Virtual Machine (LLVM)** is a collection of libraries and tools that make it easy to build compilers, **optimizers, Just-In-Time code generators**, and many other compiler-related programs.
	- Clang is an **"LLVM native" C/C++/Objective-C compiler**.
![](/images/cs/llvm.png)
</script></section>
<section data-markdown><script type="text/template">
## C++ Compiler for Windows(2/2)
- GCC (**MinGW-w64 / MSYS2**)
	- [GCC](https://gcc.gnu.org/) was originally written as the compiler for the GNU operating system.
	- The GNU Compiler Collection includes front ends for C, C++, Objective-C, Objective-C++, Fortran, Ada, **Go**, D, Modula-2, COBOL, **Rust**, and Algol 68 as well as libraries for these languages (libstdc++,...).
	- [Installing MSYS2/MinGW64](../cpp/01intro.html#/3/6) and Clang or GCC
- MSVC (Microsoft Visual C++)
	- [Microsoft Visual Studio](https://visualstudio.microsoft.com/downloads/) ≫ 02 Tools for Visual Studio ≫ [Build Tools for Visual Studio 2026](https://visualstudio.microsoft.com/downloads/) or [LTSCs](https://learn.microsoft.com/en-us/visualstudio/releases/2022/release-history#release-dates-and-build-numbers)
</script></section>
<section data-markdown><script type="text/template">
## HelloCpp of C++
- 編譯 C++ 原始程式碼
	- **clang++ -std=c++20 -c helloCpp.cpp -o helloCpp.o**
- 連結(linking) 相關的 library 產出執行檔
	- **clang++ helloCpp.o -o helloCpp.exe**
- Download [helloCpp.cpp](../src/cs/helloCpp.cpp) source code
![](/images/cs/helloCpp.png)
</script></section>
<section data-markdown><script type="text/template">
## Summary
- 我們使用 Algorithm 來描述問題，提供正確解決的執行步驟
- 我們透過 Program Language 實現 Algorithm 解決真實問題的執行步驟
- Programming Language 可以分成 Low-level 和 High-Level, Machine and Assembly Language 是
  屬於 Low-level Programming Language, C, C++, Java, Python, Javascript, etc, ..., 屬於 High-Level Programming Language
- High-Level Programming Language 又可以分成 Compiled 及 Interpreted Programming Language
- **因 CPUs 內部設計的架構不同，部分 Compiled Language Codes 需做修改才來能被編譯與執行**
</script></section>

<section data-markdown><script type="text/template">
# Hardware
</script></section>
<section data-markdown><script type="text/template">
## Computer History
- 算盤
	- 中國的算盤是**世界上最早的計算機器**
- 計算機(Calculator)
	- 從大型機械結構的計算機，再到真空管演進到電晶體組成的計算機
- 電腦(Computer)
	- 從真空管、電晶體、積體電路到超大型積體電路，**1970 年發明微處理器 (Microprocessors)，將整個中央處理器 (CPU) 縮小至單一晶片上**，個人電腦 (PC) 時代來臨
	- [Timeline of Computer History](https://www.computerhistory.org/timeline/computers/)
</script></section>
<section data-markdown><script type="text/template">
# Chip
</script></section>
<section data-markdown><script type="text/template">
## Transistor and VLSI
- Transistor(電晶體)
	- MOSFET 電晶體: 它就像一個極微小的電子開關，**透過「閘極」施加電壓來控制電流的通過與否，從而產生 0 和 1 的數位訊號進行運算**
- VLSI(超大型積體電路, Very-Large-Scale Integration)
	- VLSI 晶片主要是使用金氧半場效電晶體(MOSFET)將**數百萬到數十億個微型電晶體整合在單一矽晶片上**的技術
![](/images/cs/transistor.jpg)
<p style="text-align:center">
<small>Source from <a href="https://en.wikipedia.org/wiki/Transistor">Wikipedia</a></small>
</p>
</script></section>
<section data-markdown><script type="text/template">
## Von Neumann architecture <br />(馮·諾伊曼系統架構)
![](/images/cs/VonNeumann.png)
<p style="text-align:center">
<small>Source from <a href="https://en.wikipedia.org/wiki/Von_Neumann_architecture#/media/File:Von_Neumann_Architecture.svg">Wikipedia</a></small>
</p>
</script></section>
<section data-markdown><script type="text/template">
## Centeral Processing Unit(CPU)
- CPU 是由算術邏輯單元(Arithmetic Logic Unit, ALU)、控制單元及暫存器(Registers)組成，主要是負責處理及運算資料
	- 英特爾 (Intel) x86、超微 (AMD)、安謀 (ARM)、蘋果公司 (Apple) A, M 系列晶片、**Nvidia Vera, RTX Spark**
![](/images/cs/cpu.png)
</script></section>
<section data-markdown><script type="text/template">
## Memory
- 揮發性記憶體 (Volatile Memory / RAM)
	- 隨機存取記憶體 (Random Access Memory, RAM)
	- 讀寫速度極快，但是**斷電後資料就會完全消失**
- 非揮發性記憶體 (Non-Volatile Memory / ROM & Flash)
	- 固態硬碟 (SSD)、快閃記憶體 (Flash Memory)、唯讀記憶體 (ROM)
	- 讀寫速度較 RAM 慢，但是**斷電後資料依然會儲存**
- 快取記憶體 (Cache)
	- **藏於 CPU 晶片內部**，快取記憶體 (Cache) 可分為 L1、L2、L3 快取
	- 容量很小(通常幾 MB 到幾百 MB)，但速度比一般的 RAM 快上數十倍
</script></section>
<section data-markdown><script type="text/template">
## Summary
- 計算機是由五大單元所組成，包括中央處理單元(CPU)、算術邏輯單元、記憶體單元、輸入及輸出單元
- 常見的中央處理單元(CPU)有 Intel, AMD x86, x64、ARM CPU、Apple iPhone, Mac、Nvidia Vera, RTX Spark 等
- 算術邏輯單元主要負責計算機運算功能，**加、減、乘、除皆由硬體組成的加法器做運算**
- 記憶體分**斷電後資料就會完全消失**的揮發性(RAM)記憶體與**斷電後資料依然存在**的非揮發性記憶體(ROM/Flash)， 
  另外，快取記憶體(Cache)藏於 CPU 晶片內部；**存取速度 Cache 比 RAM 快，RAM 比 ROM/Flash 快**
- 輸入、輸出設備種類繁多，**經由網路形成物聯網(Internet of Thing, IoT)，輸入及輸出設備更是多元**
</script></section>
</section><!--end block-->

<section data-markdown><script type="text/template">
# Booting Computer 
</script></section>
<section data-markdown><script type="text/template">
## 電腦啟動的程序
- 電源啟動與硬體自我測試
	- CPU 開始執行內建在 ROM 中的 UEFI/BIOS 韌體程式，檢測關鍵硬體(如：記憶體容量、顯示卡、硬碟是否異常)
- 尋找開機驅動裝置
	- UEFI/BIOS 會根據內部設定的優先順序，依序到固態硬碟(SSD)、傳統硬碟(HDD)、USB 或網路去尋找作業系統
- 載入開機管理程式 (Bootloader)
	- CPU 從硬碟的引導磁區讀取一小段名為開機管理程式(Bootloader)的代碼
- 載入作業系統內核 (Kernel)
	- Bootloader 開始在硬碟中尋找作業系統的**內核(Kernel)** 檔案，並將其大量載入到 RAM 中
</script></section>
<section data-markdown><script type="text/template">
## 各知名品牌 UEFI/BIOS 開機選單快捷鍵

| 品牌 (Brand) | UEFI/BIOS 鍵 | 開機選單鍵 |
| :--- | :--- | :--- |
| **ASUS (華碩)** | `F2`, `Delete` | `F8` (筆電), `Esc` (桌機) |
| **Dell (戴爾)** | `F2` | `F12` |
| **HP (惠普)** | `F10` | `F9` (或先按 `Esc` 再按 `F9`) |
| **Lenovo (聯想)** | `F2` 或 `Fn + F2`, `F1` | `F12` 或 `Fn + F12` |
| **Acer (宏碁)** | `F2`, `Delete` | `F12` |
| **MSI (微星)** | `Delete` | `F11` |
	- UEFI: Unified Extensible Firmware Interface(統一可延伸韌體介面)
	- BIOS: Basic Input/Output System(基本輸入輸出系統)
	- 快速成功進入的小技巧
		- *連續狂按*：開機或重新啟動的黑畫面瞬間，就要*每秒連續敲擊*對應的快捷鍵，直到畫面出現為止
		- *Fn 鍵組合*：部分新筆電預設啟動了媒體鍵功能，因此按 `F2` 或 `F12` 時，必須*同時按住 `Fn` 鍵*才有效
</script></section>

<section data-markdown><script type="text/template">
## 製作開機 USB 磁碟
- 所需準備的物品、檔案及軟體
	- 一個 USB 磁碟，**請先將 USB 內的檔案資料到備份其他的硬碟或 USB**
	- Windows, Linux, MacOS, FreeBSD 等作業系統的 ISO 檔
	- [Ventoy](https://www.ventoy.net/en/index.html) or [Rufus](https://rufus.ie/zh_TW/) 製作 USB 開機磁碟的軟體
		- Ventoy 可以**同時放入多個作業系統的 ISO 檔**，建議使用 Ventoy 製作 USB 開機磁碟 
![](/images/cs/ventoy.webp)
</script></section>
<section data-markdown><script type="text/template">
## 多重系統開機管理程式
- [The rEFInd Boot Manager](https://www.rodsbooks.com/refind/)
![](/images/cs/refind.png)
</script></section>
<section data-markdown><script type="text/template">
## Summary
- 按下開機鍵，電腦從 ROM 中讀取開機程式，開機程式先檢查硬體是否正常？**再交由 UEFI/BIOS 決定開機方式**，指定儲存在不同位置中的作業系統，使用者依照作業系統的權限登入系統
- 作業系統可以儲存在硬碟、隨身碟(USB)或者**網路上的機器**，透過 UEFI/BIOS 指定給這些儲存在不同儲存體的作業系統開機
- **製作開機 USB 建議使用 [Ventoy](https://www.ventoy.net/en/index.html) 來製作**，若 USB 容量僅能容納一個作業系統，則可以使用 [Rufus](https://rufus.ie/zh_TW/) 製作
- 安裝作業系統前，建議先規劃好你的硬碟，至少把硬碟分割(partition)成 2 個 partition，第 1 個 partition 安裝 Windows 系統，第 2 個存放資料
- 安裝多個作業系統時，建議**先安裝 Windows 系統，再安裝多重系統開機管理程式，最後安裝 Unix-like/MacOS 系統**
</script></section>
