<section data-markdown><script type="text/template">
## Starting a Django project
- Installation of Django
	- **mkdir dj_hello; cd dj_hello; uv init .; uv add django**
	- **.\\.venv\\Scripts\activate**
	- **uv run python -m django --version**
- Create a Django project([helloV1.7z source codes](../src/django/helloV1.7z))
	- **django-admin startproject hello .**
	- **python manage.py runserver** or **uv run manage.py runserver**
- Using browser to open the URL [http://localhost:8000](http://localhost:8000)  which you should can see "The install worked successfully! Congratulations." page.
</script></section>

<section data-markdown><script type="text/template">
## Django's MVT Pattern(1/2)
- Django follows the [Model-View-Controller(MVC)](./03django.html#/1/2) architecture, but it uses a slightly different naming convention known as **Model-Template-View(MVT)**.
![](/images/django/mvc.png)
<p style="font-size:small;text-align:center">source from: <a href="https://developer.mozilla.org/en-US/docs/Glossary/MVC">Mozilla's MDN</a></p>
</script></section>
<section data-markdown><script type="text/template">
## Django's MVT Pattern(2/2)
- **Model(The Data Layer)**
	- Django uses an Object-Relational Mapper(ORM), allowing you to interact with your database using Python classes rather than raw SQL.
- **View(The Logic Layer)**
	- In Django, the View is a Python function or class that contains the business logic.
- **Template(The Presentation Layer)**
	- Templates are typically HTML files that use the Django Template Language(DTL) to dynamically display data passed to them from the View.
</script></section>

## Migrations to database(1/2)
- On the command line, we still see that warning about 18 unapplied migrations.
![](/images/django/migrate.png)
</script></section>
<section data-markdown><script type="text/template">
## Migrations to database(2/2)
- As a project **grows over time**, there are **often many changes to the Django
database models** that define the structure of a database and all its tables. 
- Migrations are special scripts Django **creates automatically to track changes to the database**.
- The Django **migrations framework** allows developers to track changes over time and **change the database to match the
configurations within a specific migrations file**.
- When you start a new project **using the startproject command**, Django includes several built-
in apps that make changes to the database, including admin, auth, contenttypes, and sessions.
</script></section>
<section data-markdown><script type="text/template">
## Migration command
- **python manage.py migrate**
![](/images/django/migrate2.png)
</script></section>

## Finally initial setup
- Restart the development server, and there will **no longer be any warnings**.
![](/images/django/migrate3.png)
</script></section>

<section data-markdown><script type="text/template">
## Layout Template
- Add the "Django" extension in VS code
	- File≫Preferences≫Settings(Ctrl + ,)≫search "emmet"≫add item: django-html, value: html in include Language
	- add the "VS code icon" extension(Optional) in VS code
- Add layout.html in template directory
	- copy index.html code to layout.html and modify code
<pre><code data-trim data-line-numbers><title>
        {% block title %}
            Hello Django
        {% endblock title %}
    </title>
        <main>
            {% block content %}
            {% endblock content %}
        </main></code></pre>
</script></section>

<section data-markdown><script type="text/template">
## Extends Layout Template
- Modify index.html codes
<pre><code data-trim data-line-numbers>{% extends 'layout.html' %}
  {% block title %}
     Home Page
  {% endblock title %}

  {% block content %}
      <H1>Home Page</H1>
      <p><a href="/about">Link to about page.</a></p>
  {% endblock content %}</code></pre>
- Modify about.html codes
<pre><code data-trim data-line-numbers>{% extends 'layout.html' %}
  {% block title %}
      About Page
  {% endblock title %}
  {% block content %}
      <H1>About Page</H1>
      <p><a href="/">Back to home page.</a></p>
  {% endblock content %}</code></pre>
</script></section>
