<section data-markdown><script type="text/template">
## 電腦教室限制安裝軟體 
- 為了管理電腦教室學生所使用的個人電腦，通常會使用還原卡，將學生在上課期間所安裝個人電腦上的軟體，**重新開機以後，就把上次學生所安裝或對這台個人電腦做任何設定的動作，還原到最初安裝這台電腦所設定及安裝軟體的狀態**
- 電腦教室的還原卡僅還原 C: 磁碟的所有安裝的軟體以及對系統的設定值，然而，**還原卡不會將儲存在 D: 磁碟所有的檔案、軟體做還原動作**
- 同學在使用電腦教室的個人電腦需要安裝軟體，例如：[Powershell](../cpp/appendixA.html#/)、[Python 套件管理程式 UV](..//python/appendixA.html#/3)或者 [Alacritty with Oh My Posh](../cpp/appendixA.html#/0/2)，**建議在 D: 磁碟新增一個屬於自己的資料夾，把上述的這些軟體安裝到 D: 磁碟中，避免下次上課需要重新安裝這些軟體**
</script></section>
<section data-markdown><script type="text/template">
## 安裝 PowerShell 到指定磁碟
- 從 [PowerShell Github Repository](https://github.com/PowerShell/PowerShell) 下載 Windows x64 系統最新版的 .zip 檔案
- **解壓縮到 D: 磁碟中屬於自己的資料夾內**，以下皆使用 d:\\elvis 資料夾為做為範例，請自己更換屬於自己名稱的資料夾
- 使用「檔案總管」連續點選 d:\\elvis\\PowerShell-7.6.0-win-x64 料夾內的 **pwsh.exe 檔案**二下，執行 PowerShell 軟體
	- PowerShell-7.6.0-win-x64 是目前 PowerShell 目前的最新版本
	- 執行 PowerShell 軟體若出現 [PowerShell 安全性問題](./appendixA.html#/0/3)，請參考這個投影片解決此問題
</script></section>
<section data-markdown><script type="text/template">
## PowerShell 安全性問題
- Windows PowerShell 為了安全性，預設禁止執行任何指令碼(Script)的保護機制
- 若使用 PowerShell 進入 Python .venv 虛擬環境，出現下圖的錯誤訊息，可以輸入底下的解除限制指令 
<pre><code data-trim>Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser</code></pre>
![](/images/django/psLimited.png)
</script></section>

</section><!--end block-->

<section data-markdown><script type="text/template">
# 安裝 UV 套件管理程式
</script></section>
<section data-markdown><script type="text/template">
## 安裝 UV 到指定的磁碟(1/2)
- 從 [UV Github Repository](https://github.com/astral-sh/uv) 下載  Windows x64 系統最新版 .zip 檔案
- **解壓縮到 D: 磁碟中屬於自己的資料夾內**，以下皆使用 d:\elvis 資料夾為做為範例，請自己更換屬於自己名稱的資料夾
- 設定 UV 安裝及執行的環境變數
	- 新增 \\uv_x64\\bin 資料夾及設定 **UV_INSTALL_DIR** 環境變數
	<pre><code data-trim data-line-numbers>mkdir d:\elvis\uv_x64\bin
UV_INSTALL_DIR=D:\elvis\uv_x64\bin</code></pre>
- 在 PowerShell 環境執行安裝指令
	<pre><code data-trim data-line-numbers>powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"</code></pre>
</script></section>
<section data-markdown><script type="text/template">
## 安裝 UV 到指定的磁碟(2/2)
- 設定 UV 執行資料夾到 PATH 環境變數
	<pre><code data-trim data-line-numbers>PATH=%PATH%;D:\elvis\uv_x64\bin</code></pre>
- 確認 UV 是否正常執行?
	<pre><code data-trim data-line-numbers>uv --version</code></pre>
- 使用 UV 安裝 Python
	<pre><code data-trim data-line-numbers>uv install python</code></pre>
- 設定 Python 執行資料夾到 PATH 環境變數
	<pre><code data-trim data-line-numbers>PATH=%PATH%;D:\elvis\uv_x64\bin;D:\elvis\uv_x64\python\cpython-3.14.2-windows-x86_64-none</code></pre>
</script></section>
<section data-markdown><script type="text/template">
# 啟動 UV 套件管理程式
</script></section>
<section data-markdown><script type="text/template">
## 使用 UV 程式啟動 Python 開發專案
- 以 [restAPI.7Z](../src/django/restAPI.7z) 為例，說明如何使用 UV 來啟動及管理專案
- 請解壓縮並切換到 D:\\elvis\\restAPI資料夾
- 輸入下面指令啟動 UV 專案
	<pre><code data-trim>uv init .</code></pre>
- 使用 UV 加入 restAPI 專案所需要的 Python 套件
	<pre><code data-trim>uv add fastapi uvicorn pydantic sqlalchemy fastapi_cors</code></pre>
- 啟動 uv 虛擬環境並執行 unicorn 伺服器
	<pre><code data-trim data-line-numbers>.\.venv\Scripts\activate
uvicorn sqlDB:app --reload</code></pre>
</script></section>
