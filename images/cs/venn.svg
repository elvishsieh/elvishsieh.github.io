<?xml version="1.0" encoding="utf-8" standalone="no"?>
<svg
  width="800"
  height="450" 
  viewBox="0 0 800 450"
  version="1.1"
  style="background-color: LightYellow"
  id="svg3"
  sodipodi:docname="venn.svg"
  xml:space="preserve"
  xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:svg="http://www.w3.org/2000/svg"><defs
    id="defs3" />
  <!-- Clean white background -->
  <!-- <rect width="800" height="450" fill="#ffffff" /> -->

  <!-- ================= LEFT: CONJUNCTION (AND) ================= -->
  <g id="conjunction-group">
    <!-- Left circle background layer -->
    <circle cx="200" cy="220" r="100" fill="#f8f9fa" />
    <!-- Right circle background layer -->
    <circle cx="300" cy="220" r="100" fill="#f8f9fa" />
    
    <!-- Shaded intersection only (Green representing AND) -->
    <path d="M 250,133.4 A 100,100 0 0,1 250,306.6 A 100,100 0 0,1 250,133.4 Z" fill="#4CAF50" fill-opacity="0.85" />
    
    <!-- Sharp black outlines for the circles -->
    <circle cx="200" cy="220" r="100" fill="none" stroke="#222222" stroke-width="3" />
    <circle cx="300" cy="220" r="100" fill="none" stroke="#222222" stroke-width="3" />
    
    <!-- Text Labels -->
    <text x="250" y="65" font-family="sans-serif" font-size="24" font-weight="bold" fill="#111111" text-anchor="middle">Conjunction (AND)</text>
    <text x="140" y="226" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">A</text>
    <text x="360" y="226" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">B</text>
    <text x="250" y="375" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2E7D32" text-anchor="middle">A ∧ B</text>
  </g>

  <!-- ================= RIGHT: DISJUNCTION (OR) ================= -->
  <g id="disjunction-group">
    <!-- Both circles completely shaded (Blue representing OR) -->
    <circle cx="550" cy="220" r="100" fill="#2196F3" fill-opacity="0.75" />
    <circle cx="650" cy="220" r="100" fill="#2196F3" fill-opacity="0.75" />
    
    <!-- Sharp black outlines for the circles -->
    <circle cx="550" cy="220" r="100" fill="none" stroke="#222222" stroke-width="3" />
    <circle cx="650" cy="220" r="100" fill="none" stroke="#222222" stroke-width="3" />
    
    <!-- Text Labels -->
    <text x="600" y="65" font-family="sans-serif" font-size="24" font-weight="bold" fill="#111111" text-anchor="middle">Disjunction (OR)</text>
    <text x="490" y="226" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">A</text>
    <text x="710" y="226" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">B</text>
    <text x="600" y="375" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1565C0" text-anchor="middle">A ∨ B</text>
  </g>
</svg>